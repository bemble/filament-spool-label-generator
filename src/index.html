<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bambu Filament Label Generator</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        font-family: Arial, Helvetica, sans-serif;
        background: #f5f5f5;
        color: #111;
        margin: 0;
        padding: 0;
      }

      /* ── Screen 1 ── */
      #screen-select {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        gap: 24px;
        padding: 32px;
      }

      #screen-select h1 {
        font-size: 2rem;
        margin: 0;
      }

      #screen-select p {
        margin: 0;
        color: #555;
      }

      #material-select {
        font-size: 1.1rem;
        padding: 10px 16px;
        border: 1px solid #ccc;
        border-radius: 8px;
        background: #fff;
        min-width: 260px;
        cursor: pointer;
      }

      .btn {
        font-size: 1rem;
        padding: 10px 28px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #00ae42;
        color: #fff;
        font-weight: 700;
        transition: background 0.15s;
      }
      .btn:hover {
        background: #009035;
      }
      .btn.secondary {
        background: #e0e0e0;
        color: #111;
      }
      .btn.secondary:hover {
        background: #ccc;
      }

      /* ── Screen 2 ── */
      #screen-labels {
        display: none;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 16px 24px;
        background: #fff;
        border-bottom: 1px solid #ddd;
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .toolbar h2 {
        margin: 0;
        font-size: 1.1rem;
        flex: 1;
      }

      #labels-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
        gap: 12px;
        padding: 24px;
      }

      #labels-grid svg {
        width: 100%;
        height: auto;
        display: block;
      }

      #loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-size: 1.2rem;
        color: #555;
      }

      /* ── Print ── */
      @media print {
        .no-print {
          display: none !important;
        }
        body {
          background: #fff;
        }
        #labels-grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, 44mm);
          gap: 3mm;
          padding: 0;
        }
        #labels-grid svg {
          width: 44mm;
          height: 18mm;
          box-shadow: none;
          border-radius: 0;
          page-break-inside: avoid;
        }
      }
    </style>
  </head>
  <body>
    <div id="loading">Loading filaments…</div>

    <div id="screen-select" style="display: none">
      <h1>Bambu Filament Labels</h1>
      <img src="./label.svg" alt="Label preview" style="max-width:320px;width:100%" />
      <p>Select a material to generate printable labels.</p>
      <select id="material-select">
        <option value="__all__">All materials</option>
      </select>
      <button class="btn" onclick="generate()">Generate Labels</button>
      <p style="font-size:0.85rem;color:#888">
        Filament database by <a href="https://github.com/piitaya/bambu-spoolman-db" target="_blank" rel="noopener">piitaya</a> — thanks!
      </p>
      <a href="https://github.com/bemble/bambu-filament-label-generator" target="_blank" rel="noopener" style="color:#888;display:flex;align-items:center;gap:6px;font-size:0.85rem;text-decoration:none" onmouseover="this.style.color='#111'" onmouseout="this.style.color='#888'">
        <svg width="16" height="16" viewBox="0 0 98 96" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z" fill="currentColor"/></svg>
        bemble/bambu-filament-label-generator
      </a>
    </div>

    <div id="screen-labels">
      <div class="toolbar no-print">
        <button class="btn secondary" onclick="back()">← Back</button>
        <h2 id="toolbar-title"></h2>
        <button class="btn" onclick="window.print()">Print</button>
      </div>
      <div id="labels-grid"></div>
    </div>

    <script>
      const DATA_URL =
        "https://raw.githubusercontent.com/piitaya/bambu-spoolman-db/main/filaments.json";

      let SVG_TEMPLATE = "";

      let filaments = [];

      async function init() {
        const res = await fetch(DATA_URL);
        filaments = await res.json();

        const materials = [...new Set(filaments.map((f) => f.material))].sort();
        const select = document.getElementById("material-select");
        for (const m of materials) {
          const opt = document.createElement("option");
          opt.value = m;
          opt.textContent = m;
          select.appendChild(opt);
        }

        document.getElementById("loading").style.display = "none";
        document.getElementById("screen-select").style.display = "flex";
      }

      function createLabel(filament) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(SVG_TEMPLATE, "image/svg+xml");

        const q = (label) => doc.querySelector(`[data-label="${label}"]`);

        q("material").textContent = filament.material;

        const badge = q("color_badge");
        badge.style.fill = `#${filament.color_hex}`;
        badge.style.fillOpacity = "1";

        q("color_name").textContent = filament.color_name;

        const codeEl = q("color_code___id");
        const tspan = codeEl.querySelector("tspan");
        (tspan || codeEl).textContent = `${filament.code} - ${filament.id}`;

        return document.importNode(doc.documentElement, true);
      }

      async function generate() {
        if (!SVG_TEMPLATE) {
          SVG_TEMPLATE = await fetch("./label.svg").then((r) => r.text());
        }
        const val = document.getElementById("material-select").value;
        const filtered =
          val === "__all__"
            ? filaments
            : filaments.filter((f) => f.material === val);

        const grid = document.getElementById("labels-grid");
        grid.innerHTML = "";
        for (const f of filtered) {
          grid.appendChild(createLabel(f));
        }

        const label = val === "__all__" ? "All materials" : val;
        document.getElementById("toolbar-title").textContent =
          `${label} — ${filtered.length} label${filtered.length !== 1 ? "s" : ""}`;

        document.getElementById("screen-select").style.display = "none";
        document.getElementById("screen-labels").style.display = "block";
      }

      function back() {
        document.getElementById("screen-labels").style.display = "none";
        document.getElementById("screen-select").style.display = "flex";
      }

      init();
    </script>
  </body>
</html>
